<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <!-- Script JavaScript embutido na página -->
  <script>
    let timerElement = document.getElementById('timer');
    let startButton = document.getElementById('startButton');
    let pauseButton = document.getElementById('pauseButton');
    let resetButton = document.getElementById('resetButton');

    let count = 0;
    let interval;

    // Função para iniciar o temporizador
    function startTimer() {
      if (!interval) {
        interval = setInterval(() => {
          count++;
          timerElement.textContent = count;
        }, 1000);
      }
    }

    // Função para pausar o temporizador
    function pauseTimer() {
      clearInterval(interval);
      interval = null;
    }

    // Função para resetar o temporizador
    function resetTimer() {
      clearInterval(interval);
      interval = null;
      count = 0;
      timerElement.textContent = count;
    }

    // Adicionando event listeners aos botões
    startButton.addEventListener('click', startTimer);
    pauseButton.addEventListener('click', pauseTimer);
    resetButton.addEventListener('click', resetTimer);


  </script>
</body>
</html>
